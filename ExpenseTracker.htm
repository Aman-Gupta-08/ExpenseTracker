<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="expenseCss.css">
</head>
<body>

    <!-- App Bar -->
    <header class="app-bar">
        <div class="container d-flex align-items-center justify-content-between">
            <div class="d-flex align-items-center gap-2">
                <i class="fa-solid fa-wallet fs-4"></i>
                <h1>ExpenseTracker</h1>
            </div>
            <div>
                <button id="themeToggle">
                    <i class="fa-solid fa-moon"></i>
                    <span>Dark Mode</span>
                </button>
            </div>
        </div>
    </header>

    <div class="container mb-5">
        <!-- Summary Cards -->
        <div class="row g-4 mb-4">
            <div class="col-md-4">
                <div class="summary-card">
                    <div class="d-flex align-items-center">
                        <div class="icon-circle bg-success-subtle">
                            <i class="fa-solid fa-arrow-down"></i>
                        </div>
                        <div class="ms-3">
                            <h5>Income</h5>
                            <h2 class="text-success fw-bold" id="income">₹0</h2>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="col-md-4">
                <div class="summary-card">
                    <div class="d-flex align-items-center">
                        <div class="icon-circle bg-danger-subtle">
                            <i class="fa-solid fa-arrow-up"></i>
                        </div>
                        <div class="ms-3">
                            <h5>Expense</h5>
                            <h2 class="text-danger fw-bold" id="expense">₹0</h2>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="summary-card">
                    <div class="d-flex align-items-center">
                        <div class="icon-circle bg-primary-subtle">
                            <i class="fa-solid fa-scale-balanced"></i>
                        </div>
                        <div class="ms-3">
                            <h5>Total Balance</h5>
                            <h2 class="text-primary fw-bold" id="balance">₹0</h2>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="row g-4">
            <!-- Add Transaction Form -->
            <div class="col-lg-4">
                <div class="card custom-card h-100">
                    <div class="card-body p-4">
                        <h2>Add Transaction</h2>
                        <div class="mb-3 mt-4">
                            <label>Description</label>
                            <input type="text" class="form-control" id="description" placeholder="What was this for?">
                        </div>
                        <div class="mb-3">
                            <label>Amount (₹)</label>
                            <input type="number" class="form-control" id="amount" placeholder="0">
                        </div>
                        <div class="mb-4">
                            <label>Type</label>
                            <select class="form-select" id="TransactionType">
                                <option>Income</option>
                                <option>Expense</option>
                            </select>
                        </div>
                        <button class="btn add-btn w-100 mt-2" id="btnn">
                            Add Transaction
                        </button>
                    </div>
                </div>
            </div>

            <!-- Transaction List -->
            <div class="col-lg-8">
                <div class="card custom-card">
                    <div class="card-body p-4">
                        <h2>Recent Transactions</h2>
                        <div class="transaction-list mt-4" id="transactionList">
                            <!-- Transactions will be injected here by JS -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="expenseTracker.js"></script>
</body>
</html>
